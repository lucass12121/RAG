### Model
model_name_or_path: Qwen/Qwen2.5-7B-Instruct

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target: all

### Dataset
dataset: sft_legal_90k
template: qwen
cutoff_len: 1024
preprocessing_num_workers: 8
overwrite_cache: true

### Training
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 1.0e-4
num_train_epochs: 2
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000

### Logging
logging_steps: 50
save_steps: 500
save_total_limit: 3

### Output
output_dir: /workspace/saves/qwen25-7b-legal-lora
overwrite_output_dir: true
report_to: none
